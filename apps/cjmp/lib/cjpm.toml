[target]

[target.aarch64-linux-ohos]
compile-option = "--cfg target_platform=hos --cfg ui_test=off -B \"${DEVECO_CANGJIE_HOME}/compiler/third_party/llvm/bin\" -B \"${DEVECO_OH_NATIVE_HOME}/sysroot/usr/lib/aarch64-linux-ohos\" -L \"${DEVECO_OH_NATIVE_HOME}/sysroot/usr/lib/aarch64-linux-ohos\" -L \"${DEVECO_OH_NATIVE_HOME}/llvm/lib/clang/15.0.4/lib/aarch64-linux-ohos\" -L \"${DEVECO_OH_NATIVE_HOME}/llvm/lib/aarch64-linux-ohos\" -L \"${DEVECO_CANGJIE_HOME}/build/linux_ohos_aarch64_llvm/openssl\" --sysroot \"${DEVECO_OH_NATIVE_HOME}/sysroot\""

[target.aarch64-linux-ohos.bin-dependencies]
path-option = ["${AARCH64_LIBS}", "${AARCH64_MACRO_LIBS}", "${CJMP_SDK_HOME}/cjmp-tools/third_party/cangjie-stdx/linux_ohos_aarch64_llvm/dynamic/stdx", "${CJMP_SDK_HOME}/cjmp-libs/ohos/dynamic/cjmp"]

[target.aarch64-linux-android26]
compile-option = "--cfg target_platform=android --cfg ui_test=off --sysroot \"${ANDROID_NDK_DIR}/toolchains/llvm/prebuilt/${SYSTEM_STRING}/sysroot\" -L \"${ANDROID_NDK_DIR}/toolchains/llvm/prebuilt/${SYSTEM_STRING}/lib/clang/17/lib/linux\" -L \"${ANDROID_NDK_DIR}/toolchains/llvm/prebuilt/${SYSTEM_STRING}/sysroot/usr/lib/aarch64-linux-android/31\" -B \"${ANDROID_CANGJIE_PATH}/third_party/llvm/bin\" -L \"${ANDROID_BRIDGE}\" -ljnicjmp"

[target.aarch64-linux-android26.bin-dependencies]
path-option = ["${ANDROID_CJ_FRONTEND}/ohos", "${ANDROID_CJ_FRONTEND}/macro/ohos", "${ANDROID_CANGJIE_STDX_PATH}", "${ANDROID_CJMP_LIBS_PATH}/cjmp", "${ANDROID_TEST_PATH}"]

[target.aarch64-apple-ios]
compile-option = "--cfg target_platform=ios --cfg ui_test=off --sysroot=${IOS_SDK_DIR} -L/Applications/Xcode.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/bin -L${IOS_BRIDGE} -ljnicjmp --debug-macro"

[target.aarch64-apple-ios.bin-dependencies]
path-option = ["${IOS_CJ_FRONTEND}/ohos", "${IOS_CJ_FRONTEND}/macro/ohos", "${IOS_CANGJIE_STDX_PATH}", "${IOS_CJMP_LIBS_PATH}/cjmp", "${IOS_TEST_PATH}"]

[target.aarch64-apple-ios.bin-dependencies.package-option]

[target.aarch64-apple-ios-simulator]
compile-option = "--cfg target_platform=ios-sim --cfg ui_test=off --sysroot=${IOS_SIM_SDK_DIR} -L/Applications/Xcode.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/bin -L${IOS_BRIDGE} -ljnicjmp --debug-macro"

[target.aarch64-apple-ios-simulator.bin-dependencies]
path-option = ["${IOS_SIM_CJ_FRONTEND}/ohos", "${IOS_SIM_CJ_FRONTEND}/macro/ohos", "${IOS_SIM_CANGJIE_STDX_PATH}", "${IOS_SIM_CJMP_LIBS_PATH}/cjmp", "${IOS_SIM_TEST_PATH}"]

[target.aarch64-apple-ios-simulator.bin-dependencies.package-option]

[package]
cjc-version = "1.1.0"
compile-option = ""
description = "Keels Application"
link-option = ""
name = "ohos_app_cangjie_entry"
output-type = "dynamic"
src-dir = "."
target-dir = ""
version = "1.0.0"

[package.package-configuration]

[package.package-configuration.ohos_app_cangjie_entry]
compile-option = "--link-options=\"-install_name @rpath/libohos_app_cangjie_entry.dylib\""

[package.package-configuration."ohos_app_cangjie_entry.logic"]
compile-option = "--link-options=\"-install_name @rpath/libohos_app_cangjie_entry.logic.dylib\""

[profile]

[profile.build]
incremental = true
lto = ""

[profile.customized-option]
debug = "-g -Woff all"
release = "--fast-math -O2 -s -Woff all"